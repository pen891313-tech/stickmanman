<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가벼운 졸라맨 격투 게임 (4x4 구조)</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        canvas {
            background: #222;
            display: block;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 게임 상태 관리 ---
const STATES = { PLAYING: 0, ROUND_END: 1, GAME_OVER: 2 };
let gameState = STATES.PLAYING;

const images = {};
const processedImages = {}; 
const imgFiles = {
    'p1_sheet': '1-1.png',
    'p2_sheet': '1-2.png'
};

// 핑크/보라색 바둑판무늬 배경 실시간 강제 제거 필터
function removeSpriteBackground(imgKey, imgElement) {
    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    tempCanvas.width = imgElement.width;
    tempCanvas.height = imgElement.height;
    tempCtx.drawImage(imgElement, 0, 0);
    
    try {
        const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        const data = imgData.data;
        
        for (let i = 0; i < data.length; i += 4) {
            let r = data[i];
            let g = data[i+1];
            let b = data[i+2];
            
            // AI 시트 특유의 핫핑크 및 연보라 격자무늬 색상 범위 지정 타겟팅 제거
            const isMagentaOrPurple = (r > 120 && b > 140 && g < 110) || (r > 200 && b > 200 && g < 150);
            if (isMagentaOrPurple) {
                data[i + 3] = 0; // 해당 픽셀 투명화
            }
        }
        tempCtx.putImageData(imgData, 0, 0);
        const newImg = new Image();
        newImg.src = tempCanvas.toDataURL();
        processedImages[imgKey] = newImg;
    } catch (e) {
        console.error("배경 제거 에러 (로컬 보안 정책 원인):", e);
        processedImages[imgKey] = imgElement; 
    }
}

Object.entries(imgFiles).forEach(([key, src]) => {
    images[key] = new Image();
    images[key].src = src;
    images[key].onload = () => { removeSpriteBackground(key, images[key]); };
});

// 정확한 4x4 매핑 데이터 (모든 동작은 가로 앞 4칸만 루프 재생)
const animRows = { move: 0, jump: 1, attack: 2, skill: 3 };

let p1Wins = 0, p2Wins = 0, currentRound = 1;
const keys = {};

window.addEventListener('keydown', e => { keys[e.key] = true; handleKeyDown(e.key); });
window.addEventListener('keyup', e => { keys[e.key] = false; });

class Player {
    constructor(id, x, y, assetKey, isFlip) {
        this.id = id;
        this.x = x;
        this.y = y;
        this.baseY = y;
        this.assetKey = assetKey;
        this.width = 120;
        this.height = 120;
        this.speed = 5;
        this.isFlip = isFlip; // 바라보는 방향 (기본 false=오른쪽, true=왼쪽)

        // 능력치 및 게이지
        this.maxHp = 100; this.hp = 100;
        this.maxMp = 100; this.mp = 0;

        // 점프 관련 물리
        this.vy = 0;
        this.isJumping = false;

        // 애니메이션 상태 (4개 제어)
        this.currentAction = 'move'; // move, jump, attack, skill
        this.frameIdx = 0;
        this.frameTimer = 0;
        this.frameSpeed = 8; 
        this.isLock = false; 
    }

    update() {
        // 초당 기력 자연 충전
        if (this.hp > 0 && this.mp < this.maxMp) this.mp = Math.min(this.maxMp, this.mp + 0.2);

        // 중력 물리 작용 (점프 행)
        if (this.isJumping) {
            this.vy += 0.6; // 중력 가속도
            this.y += this.vy;
            if (this.y >= this.baseY) {
                this.y = this.baseY;
                this.vy = 0;
                this.isJumping = false;
                if (!this.isLock) this.currentAction = 'move';
            }
        }

        // 애니메이션 프레임 관리 (4칸 제한 고정)
        this.frameTimer++;
        if (this.frameTimer >= this.frameSpeed) {
            this.frameTimer = 0;
            this.frameIdx++;
            if (this.frameIdx >= 4) { // 4프레임 엄격 제한
                if (this.isLock) {
                    this.isLock = false;
                    this.currentAction = this.isJumping ? 'jump' : 'move';
                }
                this.frameIdx = 0;
            }
        }
    }

    changeAction(action, isLock = false) {
        if (this.currentAction === action) return;
        if (this.isLock && !isLock) return;
        this.currentAction = action;
        this.frameIdx = 0;
        this.frameTimer = 0;
        this.isLock = isLock;
    }

    jump() {
        if (this.isJumping) return;
        this.isJumping = true;
        this.vy = -13; // 도약 점프력
        this.changeAction('jump');
    }

    draw() {
        ctx.save();
        let drawX = this.x;
        
        // 이동 단축키 입력 방향에 따라 좌우 X축 대칭 반전 렌더링
        if (this.isFlip) {
            ctx.scale(-1, 1);
            drawX = -this.x - this.width;
        }

        const row = animRows[this.currentAction];
        const processedImg = processedImages[this.assetKey];

        if (processedImg) {
            // 원본 격자 256x256 매핑 적용해 그리기
            ctx.drawImage(
                processedImg,
                this.frameIdx * 256, row * 256, 256, 256,
                drawX, this.y, this.width, this.height
            );
        } else {
            // 이미지 미로드 시 대체 박스
            ctx.fillStyle = this.id === 1 ? '#3498db' : '#e74c3c';
            ctx.fillRect(drawX, this.y + 20, this.width, this.height - 20);
        }
        ctx.restore();

        // 머리 위 정보 바 UI
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(this.x, this.y - 20, this.width, 6);
        ctx.fillRect(this.x, this.y - 10, this.width, 4);
        ctx.fillStyle = '#2ecc71'; // HP
        ctx.fillRect(this.x, this.y - 20, this.width * (this.hp / this.maxHp), 6);
        ctx.fillStyle = '#3498db'; // MP
        ctx.fillRect(this.x, this.y - 10, this.width * (this.mp / this.maxMp), 4);
    }
}

let p1, p2;
function initRound() {
    p1 = new Player(1, 150, 320, 'p1_sheet', false);
    p2 = new Player(2, 690, 320, 'p2_sheet', true);
    gameState = STATES.PLAYING;
}

function handleKeyDown(key) {
    if (gameState !== STATES.PLAYING) return;

    // --- P1 단발 액션 ---
    if (!p1.isLock && p1.hp > 0) {
        if (key === 'w' || key === 'W') p1.jump();
        if (key === 'f' || key === 'F') { p1.changeAction('attack', true); checkHit(p1, p2, 8); }
        if (key === 'g' || key === 'G') {
            if (p1.mp >= 30) { p1.mp -= 30; p1.changeAction('skill', true); checkHit(p1, p2, 18); }
        }
    }

    // --- P2 단발 액션 ---
    if (!p2.isLock && p2.hp > 0) {
        if (key === 'ArrowUp') p2.jump();
        if (key === '1') { p2.changeAction('attack', true); checkHit(p2, p1, 8); }
        if (key === '2') {
            if (p2.mp >= 30) { p2.mp -= 30; p2.changeAction('skill', true); checkHit(p2, p1, 18); }
        }
    }
}

function checkHit(attacker, defender, damage) {
    // 플레이어 겹침 및 통과 허용 처리 후 거리 계산 타격 판정
    const dist = Math.abs((attacker.x + attacker.width/2) - (defender.x + defender.width/2));
    if (dist < 140 && defender.hp > 0) {
        defender.hp = Math.max(0, defender.hp - damage);
    }
}

function updateMovement() {
    if (gameState !== STATES.PLAYING) return;

    // --- P1 실시간 좌우 이동 조작 ---
    if (!p1.isLock && p1.hp > 0) {
        let moving = false;
        if (keys['a'] || keys['A']) {
            p1.x -= p1.speed; p1.isFlip = true; moving = true;
        } else if (keys['d'] || keys['D']) {
            p1.x += p1.speed; p1.isFlip = false; moving = true;
        }
        if (moving && !p1.isJumping) p1.changeAction('move');
        else if (!moving && !p1.isJumping) p1.changeAction('move'); // 졸라맨 특성상 기본 상태 유지
    }

    // --- P2 실시간 좌우 이동 조작 ---
    if (!p2.isLock && p2.hp > 0) {
        let moving = false;
        if (keys['ArrowLeft']) {
            p2.x -= p2.speed; p2.isFlip = true; moving = true;
        } else if (keys['ArrowRight']) {
            p2.x += p2.speed; p2.isFlip = false; moving = true;
        }
        if (moving && !p2.isJumping) p2.changeAction('move');
    }

    // 화면 영역 경계 제한 처리
    [p1, p2].forEach(p => {
        if (p.x < 0) p.x = 0;
        if (p.x > canvas.width - p.width) p.x = canvas.width - p.width;
    });
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 배경 지면선 그리기
    ctx.strokeStyle = '#444'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, 440); ctx.lineTo(canvas.width, 440); ctx.stroke();

    // 동적 물리 및 렌더링 업데이트
    updateMovement();
    p1.update(); p2.update();
    p1.draw(); p2.draw();

    // 헤더 대전 상황 스코어 UI 
    ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0, 0, canvas.width, 60);
    ctx.fillStyle = "#fff"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
    ctx.fillText(`ROUND ${currentRound}`, canvas.width/2, 35);
    ctx.textAlign = "left"; ctx.fillText(`P1 승리: ${p1Wins} / 2`, 40, 35);
    ctx.textAlign = "right"; ctx.fillText(`P2 승리: ${p2Wins} / 2`, canvas.width - 40, 35);

    // 하단 조작 안내 키 가이드바 생성
    ctx.fillStyle = "rgba(255,255,255,0.05)"; ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
    ctx.fillStyle = "#aaa"; ctx.font = "12px Arial"; ctx.textAlign = "center";
    ctx.fillText("P1 조작: A, D (이동) | W (점프) | F (기본공격) | G (스킬스톰: 기력30)", canvas.width/4 + 30, canvas.height - 15);
    ctx.fillText("P2 조작: ←, → (이동) | ↑ (점프) | 1 (기본공격) | 2 (스킬에너지: 기력30)", (canvas.width/4)*3 - 30, canvas.height - 15);

    // 승패 판정 시스템 (3판 2선승제 적용)
    if (gameState === STATES.PLAYING) {
        if (p1.hp <= 0 || p2.hp <= 0) {
            gameState = STATES.ROUND_END;
            setTimeout(() => {
                if (p1.hp <= 0) p2Wins++;
                else p1Wins++;

                if (p1Wins >= 2 || p2Wins >= 2) {
                    gameState = STATES.GAME_OVER;
                } else {
                    currentRound++;
                    initRound();
                }
            }, 1000);
        }
    }

    if (gameState === STATES.ROUND_END) {
        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#fff"; ctx.font = "bold 35px Arial"; ctx.textAlign = "center";
        ctx.fillText("ROUND OVER", canvas.width/2, canvas.height/2);
    }

    if (gameState === STATES.GAME_OVER) {
        ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#f1c40f"; ctx.font = "bold 40px Arial"; ctx.textAlign = "center";
        ctx.fillText(`최종 대전 승리: ${p1Wins >= 2 ? 'Player 1' : 'Player 2'}!`, canvas.width/2, canvas.height/2);
        ctx.fillStyle = "#fff"; ctx.font = "16px Arial";
        ctx.fillText("새로고침(F5)을 누르면 게임을 다시 시작합니다.", canvas.width/2, canvas.height/2 + 50);
    }

    requestAnimationFrame(gameLoop);
}

// 최초 가동 실행
initRound();
gameLoop();
</script>

</body>
</html>
