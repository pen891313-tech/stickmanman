<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>전설의 검 강화하기</title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #1e1e24;
      color: #fff;
      text-align: center;
      padding: 50px;
    }
    .game-container {
      background-color: #2a2a35;
      border-radius: 15px;
      padding: 30px;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      min-width: 350px;
    }
    h1 {
      color: #ffd700;
      margin-bottom: 30px;
    }
    .sword-status {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #00e676;
    }
    .probability {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }
    .btn-upgrade {
      background-color: #e53935;
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-upgrade:hover {
      background-color: #d32f2f;
    }
    .btn-upgrade:disabled {
      background-color: #555;
      cursor: not-allowed;
    }
    .result-log {
      margin-top: 25px;
      padding: 10px;
      border-radius: 5px;
      background-color: #15151c;
      min-height: 40px;
      line-height: 40px;
      font-size: 15px;
    }
    .success { color: #00e676; }
    .fail { color: #ff1744; }
  </style>
</head>
<body>

  <div class="game-container">
    <h1>⚔️ 전설의 검 강화</h1>
    
    <div class="sword-status" id="swordDisplay">[+0] 훈련용 연습 검</div>
    <div class="probability" id="probDisplay">다음 강화 확률: 100%</div>
    
    <button class="btn-upgrade" id="upgradeBtn" onclick="attemptUpgrade()">강화하기</button>
    
    <div class="result-log" id="resultLog">강화 버튼을 눌러 모험을 시작하세요.</div>
  </div>

  <script>
    let currentLevel = 0;

    // 검의 레벨에 따른 이름 변경 (재미 요소)
    function getSwordName(level) {
      if (level === 0) return "훈련용 연습 검";
      if (level < 20) return "철광석 검";
      if (level < 40) return "강철 장검";
      if (level < 60) return "기사의 명검";
      if (level < 80) return "다이아몬드 세이버";
      if (level < 100) return "영웅의 성검";
      return "👑 전설의 신검 (MAX)";
    }

    // UI 업데이트 함수
    function updateUI() {
      document.getElementById('swordDisplay').innerText = `[+${currentLevel}] ${getSwordName(currentLevel)}`;
      
      let nextProb = 100 - currentLevel;
      if (nextProb < 1) nextProb = 1;
      
      if (currentLevel >= 100) {
        document.getElementById('probDisplay').innerText = "최고 레벨에 도달했습니다!";
        document.getElementById('upgradeBtn').disabled = true;
      } else {
        document.getElementById('probDisplay').innerText = `다음 강화 확률: ${nextProb}%`;
        document.getElementById('upgradeBtn').disabled = false;
      }
    }

    // 강화 시도 함수 (GS 서버 호출)
    function attemptUpgrade() {
      const btn = document.getElementById('upgradeBtn');
      const log = document.getElementById('resultLog');
      
      // 중복 클릭 방지
      btn.disabled = true;
      log.innerText = "강화 중...";
      log.className = "result-log";

      // code.gs의 upgradeSword 함수 호출
      google.script.run
        .withSuccessHandler(function(result) {
          // 서버에서 계산된 결과 적용
          currentLevel = result.level;
          log.innerText = result.message;
          
          if (result.success) {
            log.className = "result-log success";
          } else {
            log.className = "result-log fail";
          }
          
          updateUI();
        })
        .withFailureHandler(function(error) {
          log.innerText = "오류가 발생했습니다: " + error.message;
          btn.disabled = false;
        })
        .upgradeSword(currentLevel);
    }
  </script>
</body>
</html>
