<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초록이 졸라맨 장애물 달리기</title>
    <style>
        body {
            margin: 0;
            background-color: #f7f9fa;
            color: #333;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        canvas {
            background: #ffffff; /* 깔끔한 흰색 배경 */
            display: block;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="960" height="400"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 게임 상태 및 프레임워크 설정
const STATES = { START: 0, PLAYING: 1, GAMEOVER: 2 };
let gameState = STATES.START;

const playerImg = new Image();
playerImg.src = '1-1.png'; // 지정해주신 러너 파일명 매핑

const TILE_SIZE = 256; // 256x256 완벽 규격 고정

// 시트 행(Row) 정보
const animRows = {
    'run': 0,
    'jump': 1,
    'slide': 2
};

let score = 0;
let gameSpeed = 6;
const keys = {};

window.addEventListener('keydown', e => { 
    keys[e.key] = true; 
    if (gameState === STATES.START && e.key === ' ') {
        resetGame();
        gameState = STATES.PLAYING;
    }
    if (gameState === STATES.GAMEOVER && e.key === ' ') {
        resetGame();
        gameState = STATES.PLAYING;
    }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

class Player {
    constructor() {
        this.x = 100;
        this.baseY = 230; // 바닥 높이 고정
        this.y = this.baseY;
        this.width = 120;
        this.height = 120;
        
        // 역학 상태 필드
        this.vy = 0;
        this.gravity = 0.7;
        this.jumpForce = -15;
        this.isJumping = false;
        this.isSliding = false;

        // 4프레임 전용 타이머 알고리즘
        this.currentAction = 'run';
        this.frameIdx = 0;
        this.frameTimer = 0;
        this.frameSpeed = 5; 
    }

    update() {
        // 실시간 키보드 입력 감지 상태 변환
        if (gameState === STATES.PLAYING) {
            if ((keys['ArrowUp'] || keys[' ']) && !this.isJumping && !this.isSliding) {
                this.vy = this.jumpForce;
                this.isJumping = true;
                this.currentAction = 'jump';
                this.frameIdx = 0;
            }
            if (keys['ArrowDown'] && !this.isJumping) {
                this.isSliding = true;
                this.currentAction = 'slide';
                this.height = 80; // 피격 히트박스 판정 축소
                this.y = this.baseY + 40;
            } else if (!keys['ArrowDown'] && this.isSliding) {
                this.isSliding = false;
                this.currentAction = 'run';
                this.height = 120;
                this.y = this.baseY;
            }
        }

        // 중력 물리 연산 규칙 처리
        if (this.isJumping) {
            this.vy += this.gravity;
            this.y += this.vy;
            if (this.y >= this.baseY) {
                this.y = this.baseY;
                this.vy = 0;
                this.isJumping = false;
                if (!this.isSliding) this.currentAction = 'run';
            }
        }

        // 4프레임 엄격 분할 루프 제어
        this.frameTimer++;
        if (this.frameTimer >= this.frameSpeed) {
            this.frameTimer = 0;
            this.frameIdx++;
            if (this.frameIdx >= 4) { // 가로 4칸 제한 규칙 반영
                this.frameIdx = 0;
            }
        }
    }

    draw() {
        const row = animRows[this.currentAction];
        if (playerImg.complete) {
            ctx.drawImage(
                playerImg,
                this.frameIdx * TILE_SIZE, row * TILE_SIZE, TILE_SIZE, TILE_SIZE,
                this.x, this.y, this.width, this.height
            );
        } else {
            // 미로드 대체 렌더러
            ctx.fillStyle = '#2ecc71';
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
    }
}

class Obstacle {
    constructor() {
        this.type = Math.random() > 0.5 ? 'high' : 'low'; // 상/하단 이지선다 장애물 구조화
        this.x = canvas.width + 50;
        this.width = 40;
        
        if (this.type === 'high') {
            this.y = 210; // 점프 시 밑으로 슬라이딩해야 하는 공중 장애물
            this.height = 50;
            this.color = '#e74c3c';
        } else {
            this.y = 290; // 뛰어 넘어야 하는 지상 장애물
            this.height = 60;
            this.color = '#34495e';
        }
    }

    update() {
        this.x -= gameSpeed;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
}

let player;
let obstacles = [];
let spawnTimer = 0;

function resetGame() {
    player = new Player();
    obstacles = [];
    score = 0;
    gameSpeed = 6;
    spawnTimer = 0;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 지면 베이스 라인 그리기
    ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, 350); ctx.lineTo(canvas.width, 350); ctx.stroke();

    if (gameState === STATES.START) {
        ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
        ctx.fillText('초록이 졸라맨 러너 게임', canvas.width / 2, canvas.height / 2 - 30);
        ctx.font = '16px Arial'; ctx.fillStyle = '#7f8c8d';
        ctx.fillText('시작하려면 스페이스바(Space)를 누르세요.', canvas.width / 2, canvas.height / 2 + 20);
        ctx.fillText('조작 가이드: ↑ 또는 스페이스(점프) | ↓ (슬라이딩 숙이기)', canvas.width / 2, canvas.height / 2 + 60);
    } 
    
    else if (gameState === STATES.PLAYING) {
        player.update();
        player.draw();

        // 시간에 따른 미세 난이도 가속 조절 시스템
        score++;
        if (score % 400 === 0) gameSpeed += 0.5;

        // 장애물 가변 생성 주기 관리 
        spawnTimer++;
        if (spawnTimer > 90 + Math.random() * 40) {
            obstacles.push(new Obstacle());
            spawnTimer = 0;
        }

        obstacles.forEach((obs, index) => {
            obs.update();
            obs.draw();

            // 정밀 AABB 충돌 충돌 박스 연산
            if (
                player.x < obs.x + obs.width &&
                player.x + player.width - 30 > obs.x &&
                player.y < obs.y + obs.height &&
                player.y + player.height > obs.y
            ) {
                gameState = STATES.GAMEOVER;
            }

            // 화면을 벗어난 장애물 자동 메모리 해제
            if (obs.x + obs.width < 0) {
                obstacles.splice(index, 1);
            }
        });

        // 인게임 실시간 스코어판 렌더링
        ctx.fillStyle = '#2c3e50'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'left';
        ctx.fillText(`SCORE: ${score}`, 30, 40);
        ctx.textAlign = 'right';
        ctx.fillText(`SPEED: ${gameSpeed.toFixed(1)}`, canvas.width - 30, 40);
    } 
    
    else if (gameState === STATES.GAMEOVER) {
        player.draw();
        obstacles.forEach(obs => obs.draw());

        ctx.fillStyle = 'rgba(0, 0, 0, 0.65)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e74c3c'; ctx.font = 'bold 36px Arial'; ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = '#ffffff'; ctx.font = '18px Arial';
        ctx.fillText(`최종 점수: ${score} 점`, canvas.width / 2, canvas.height / 2 + 25);
        ctx.font = '14px Arial'; ctx.fillStyle = '#bdc3c7';
        ctx.fillText('재도전하려면 다시 스페이스바(Space)를 누르세요.', canvas.width / 2, canvas.height / 2 + 70);
    }

    requestAnimationFrame(gameLoop);
}

// 초기화 가동
resetGame();
gameLoop();
</script>

</body>
</html>
